version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sibsutis_db
    restart: always
    environment:
      POSTGRES_USER: scheduler_admin
      POSTGRES_PASSWORD: superSecretPassword123
      POSTGRES_DB: schedule_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  worker:
    build: .
    container_name: sibsutis_parser
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DB_HOST: db
    volumes:
      - .:/app

volumes:
  pgdata:
